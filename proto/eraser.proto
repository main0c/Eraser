syntax = "proto3";

package eraser;

message DiskInfo {
  string disk_name = 1;
  uint64 total_bytes = 2;
  uint64 used_bytes = 3;
  string filesystem = 4;
  string serial = 5;
}

message EraseInfo {
  string task_id = 1;
  string algorithm = 2;
  uint32 progress = 3;
  bool finished = 4;
  string result = 5;
  int64 timestamp_ms = 6;
}

message ClientReport {
  string client_id = 1;
  string host_name = 2;
  string ip = 3;
  int64 report_time_ms = 4;
  repeated DiskInfo disks = 5;
  EraseInfo erase = 6;
}
